services:
  baseapi:
    build:
      context: ./BaseApi
      dockerfile: Dockerfile
    # Ports moved to environment-specific files
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BaseApi;User Id=sa;Password=Password123!;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Mongo=mongodb://mongodb:27017/BaseApi
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    restart: always

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
    # Ports moved to environment-specific files
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -Q 'SELECT 1' -C" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    # Ports moved to environment-specific files
    volumes:
      - redis_data:/data
    restart: always

  mongodb:
    image: mongo:7.0
    # Ports moved to environment-specific files
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=BaseApi
    restart: always

  # ── Observability Stack ─────────────────────────────────────────────────────

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/local-config.yaml
    # Ports moved to environment-specific files
    restart: unless-stopped

  vector:
    image: timberio/vector:0.39.0-alpine
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    # Ports moved to environment-specific files
    restart: unless-stopped

volumes:
  sql_data:
  mongo_data:
  redis_data:
  grafana_data:
