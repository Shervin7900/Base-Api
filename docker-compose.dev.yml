services:
  baseapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "7000:8080"
      - "7001:8081"
      - "5000:5000"

  sqlserver:
    ports:
      - "1433:1433"

  redis:
    ports:
      - "6379:6379"

  mongodb:
    ports:
      - "27017:27017"

  loki:
    ports:
      - "3100:3100"

  grafana:
    ports:
      - "3000:3000"
